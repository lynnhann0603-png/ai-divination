<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" width="300" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#F5E6B8"/></linearGradient>
    <linearGradient id="scene" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1A1A4E"/><stop offset="100%" stop-color="#2D2D2D"/></linearGradient>
  </defs>
  <rect width="300" height="500" rx="16" fill="url(#bg)"/>
  <rect x="12" y="12" width="276" height="476" rx="12" fill="none" stroke="#C4A44E" stroke-width="2.5"/>
  <rect x="18" y="50" width="264" height="380" rx="8" fill="url(#scene)"/>
  <!-- Lightning bolt -->
  <path d="M180,55 L140,160 L165,155 L120,280 L155,265 L100,400" fill="none" stroke="#FFD700" stroke-width="4"/>
  <path d="M182,55 L142,160 L167,155 L122,280 L157,265 L102,400" fill="none" stroke="#FFFF00" stroke-width="2" opacity="0.6"/>
  <!-- Tower -->
  <rect x="105" y="130" width="90" height="250" rx="4" fill="#808080"/>
  <rect x="100" y="130" width="100" height="20" rx="4" fill="#696969"/>
  <!-- Tower battlements -->
  <rect x="100" y="120" width="15" height="15" fill="#696969"/>
  <rect x="125" y="120" width="15" height="15" fill="#696969"/>
  <rect x="160" y="120" width="15" height="15" fill="#696969"/>
  <rect x="185" y="120" width="15" height="15" fill="#696969"/>
  <!-- Crown being knocked off -->
  <path d="M120,105 Q150,85 180,105" fill="#FFD700"/>
  <rect x="120" y="105" width="60" height="12" rx="2" fill="#FFD700"/>
  <!-- Crown tilting and flying off -->
  <g transform="translate(180,70) rotate(30)">
    <path d="M-20,0 Q0,-15 20,0" fill="#FFD700"/>
    <rect x="-20" y="0" width="40" height="8" rx="2" fill="#FFD700"/>
  </g>
  <!-- Windows -->
  <rect x="125" y="180" width="15" height="20" rx="3" fill="#FFD700" opacity="0.5"/>
  <rect x="160" y="180" width="15" height="20" rx="3" fill="#FFD700" opacity="0.5"/>
  <rect x="125" y="230" width="15" height="20" rx="3" fill="#FFD700" opacity="0.5"/>
  <rect x="160" y="230" width="15" height="20" rx="3" fill="#FFD700" opacity="0.5"/>
  <!-- Door -->
  <rect x="130" y="330" width="40" height="50" rx="4" fill="#444"/>
  <!-- Flames -->
  <g opacity="0.8">
    <path d="M110,140 Q105,120 115,130 Q120,115 125,135" fill="#FF4500"/>
    <path d="M170,140 Q165,118 175,128 Q180,112 185,135" fill="#FF4500"/>
    <path d="M130,150 Q125,130 135,140 Q138,125 142,145" fill="#FF6600"/>
    <path d="M155,150 Q150,128 160,138 Q163,123 168,145" fill="#FF6600"/>
  </g>
  <!-- Falling figure left -->
  <g transform="translate(60,300) rotate(-20)">
    <circle cx="0" cy="-15" r="10" fill="#FFDAB9"/>
    <rect x="-8" y="-5" width="16" height="30" fill="#4169E1"/>
    <line x1="-5" y1="25" x2="-10" y2="45" stroke="#FFDAB9" stroke-width="4"/>
    <line x1="5" y1="25" x2="10" y2="45" stroke="#FFDAB9" stroke-width="4"/>
    <line x1="-8" y1="5" x2="-25" y2="-5" stroke="#FFDAB9" stroke-width="4"/>
    <line x1="8" y1="5" x2="20" y2="-10" stroke="#FFDAB9" stroke-width="4"/>
  </g>
  <!-- Falling figure right -->
  <g transform="translate(230,280) rotate(25)">
    <circle cx="0" cy="-15" r="10" fill="#FFDAB9"/>
    <path d="-5,-22 Q0,-28 5,-22" fill="#DAA520"/>
    <rect x="-8" y="-5" width="16" height="30" fill="#E8352D"/>
    <line x1="-5" y1="25" x2="-10" y2="45" stroke="#FFDAB9" stroke-width="4"/>
    <line x1="5" y1="25" x2="10" y2="45" stroke="#FFDAB9" stroke-width="4"/>
    <line x1="-8" y1="5" x2="-20" y2="-10" stroke="#FFDAB9" stroke-width="4"/>
    <line x1="8" y1="5" x2="25" y2="-5" stroke="#FFDAB9" stroke-width="4"/>
  </g>
  <!-- Smoke/debris -->
  <g fill="#808080" opacity="0.3">
    <circle cx="80" cy="360" r="8"/><circle cx="220" cy="350" r="6"/>
    <circle cx="70" cy="380" r="5"/><circle cx="235" cy="375" r="7"/>
  </g>
  <text x="150" y="38" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#C4A44E">XVI</text>
  <text x="150" y="458" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#5B4A2A">THE TOWER</text>
  <text x="150" y="478" text-anchor="middle" font-family="serif" font-size="14" fill="#8B7355">高塔</text>
</svg>