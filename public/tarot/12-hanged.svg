<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" width="300" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#F5E6B8"/></linearGradient>
    <linearGradient id="scene" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#87CEEB"/><stop offset="70%" stop-color="#C0C0C0"/><stop offset="100%" stop-color="#808080"/></linearGradient>
  </defs>
  <rect width="300" height="500" rx="16" fill="url(#bg)"/>
  <rect x="12" y="12" width="276" height="476" rx="12" fill="none" stroke="#C4A44E" stroke-width="2.5"/>
  <rect x="18" y="50" width="264" height="380" rx="8" fill="url(#scene)"/>
  <!-- Cross beam (T shape) -->
  <rect x="60" y="80" width="180" height="15" rx="3" fill="#808080"/>
  <rect x="145" y="80" width="10" height="300" fill="#808080"/>
  <!-- Rope from beam -->
  <line x1="150" y1="95" x2="150" y2="160" stroke="#DAA520" stroke-width="3"/>
  <!-- Hanging figure - upside down -->
  <!-- Head at bottom with halo -->
  <circle cx="150" cy="310" r="25" fill="#FFD700" opacity="0.3"/>
  <circle cx="150" cy="310" r="20" fill="#FFDAB9"/>
  <path d="M130,315 Q135,330 150,335 Q165,330 170,315" fill="#DAA520"/>
  <circle cx="143" cy="308" r="2" fill="#333"/><circle cx="157" cy="308" r="2" fill="#333"/>
  <path d="M144,300 Q150,296 156,300" fill="none" stroke="#333" stroke-width="1.2"/>
  <!-- Body upside down - blue tunic -->
  <path d="M132,290 L128,190 L172,190 L168,290Z" fill="#4169E1"/>
  <!-- Red leggings -->
  <line x1="140" y1="190" x2="135" y2="140" stroke="#CC0000" stroke-width="10" stroke-linecap="round"/>
  <!-- One leg crossed behind -->
  <line x1="160" y1="190" x2="165" y2="140" stroke="#CC0000" stroke-width="10" stroke-linecap="round"/>
  <!-- Cross shape of legs (4 shape) -->
  <line x1="165" y1="145" x2="140" y2="120" stroke="#CC0000" stroke-width="8" stroke-linecap="round"/>
  <!-- Foot attached to rope -->
  <line x1="150" y1="160" x2="150" y2="130" stroke="#DAA520" stroke-width="3"/>
  <ellipse cx="150" cy="125" rx="8" ry="5" fill="#FFD700"/>
  <!-- Arms hanging behind (hidden) - slight indication -->
  <line x1="128" y1="250" x2="115" y2="280" stroke="#FFDAB9" stroke-width="5" stroke-linecap="round"/>
  <line x1="172" y1="250" x2="185" y2="280" stroke="#FFDAB9" stroke-width="5" stroke-linecap="round"/>
  <!-- Yellow glow around head -->
  <circle cx="150" cy="310" r="30" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.4"/>
  <!-- Leaves on beam -->
  <g fill="#228B22" opacity="0.6">
    <ellipse cx="75" cy="78" rx="8" ry="4" transform="rotate(-20,75,78)"/>
    <ellipse cx="100" cy="76" rx="8" ry="4" transform="rotate(10,100,76)"/>
    <ellipse cx="200" cy="76" rx="8" ry="4" transform="rotate(-10,200,76)"/>
    <ellipse cx="225" cy="78" rx="8" ry="4" transform="rotate(20,225,78)"/>
  </g>
  <text x="150" y="38" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#C4A44E">XII</text>
  <text x="150" y="458" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#5B4A2A">THE HANGED MAN</text>
  <text x="150" y="478" text-anchor="middle" font-family="serif" font-size="14" fill="#8B7355">倒吊人</text>
</svg>