<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" width="300" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#F5E6B8"/>
    </linearGradient>
    <linearGradient id="scene" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4E6F1"/>
      <stop offset="100%" stop-color="#AED6F1"/>
    </linearGradient>
  </defs>

  <!-- 暖黄色背景（与大阿卡纳一致） -->
  <rect width="300" height="500" rx="16" fill="url(#bg)"/>

  
    <!-- 外边框（与大阿卡纳统一金色） -->
    <rect x="12" y="12" width="276" height="476" rx="12" fill="none" stroke="#C4A44E" stroke-width="2.5"/>
