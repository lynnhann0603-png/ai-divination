    <circle cx="276" cy="476" r="2.5" fill="#C4A44E" opacity="0.6"/>

  <!-- 场景区域 -->
  <rect x="18" y="50" width="264" height="340" rx="8" fill="url(#scene)" opacity="0.5"/>

  <!-- 顶部：编号 + 花色元素名 -->
