  <text x="270" y="42" font-family="sans-serif" font-size="14" fill="#5DADE2" text-anchor="end" opacity="0.7">水</text>

  <!-- 中央主体内容 -->
  
        <g transform="translate(150,210)">
          <path d="M-26.6,-17.099999999999998 Q-30.400000000000002,20.9 -5.7,30.400000000000002 L5.7,30.400000000000002 Q30.400000000000002,20.9 26.6,-17.099999999999998 Z" fill="#2E7D9B"/>
