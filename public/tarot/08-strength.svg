  <line x1="130" y1="180" x2="110" y2="250" stroke="#FFDAB9" stroke-width="7" stroke-linecap="round"/>
  <line x1="170" y1="180" x2="180" y2="240" stroke="#FFDAB9" stroke-width="7" stroke-linecap="round"/>
  <!-- Lion body -->
  <ellipse cx="150" cy="300" rx="55" ry="35" fill="#DAA520"/>
  <ellipse cx="150" cy="300" rx="55" ry="35" fill="none" stroke="#B8860B" stroke-width="1.5"/>
  <!-- Lion head -->
  <circle cx="150" cy="260" r="28" fill="#DAA520"/>
  <!-- Mane -->
  <path d="M122,260 Q115,240 125,225 Q140,215 150,218 Q160,215 175,225 Q185,240 178,260" fill="#B8860B" opacity="0.7"/>
  <!-- Lion face -->
  <circle cx="140" cy="258" r="3" fill="#333"/><circle cx="160" cy="258" r="3" fill="#333"/>
  <ellipse cx="150" cy="268" rx="6" ry="4" fill="#8B4513"/>
  <!-- Lion mouth being held open -->
  <path d="M140,275 Q150,285 160,275" fill="none" stroke="#333" stroke-width="2"/>
