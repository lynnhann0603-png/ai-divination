  <circle cx="140" cy="250" r="5" fill="#FFDAB9"/><circle cx="160" cy="250" r="5" fill="#FFDAB9"/>
  <!-- Lion legs -->
  <line x1="110" y1="320" x2="100" y2="370" stroke="#DAA520" stroke-width="8" stroke-linecap="round"/>
  <line x1="190" y1="320" x2="200" y2="370" stroke="#DAA520" stroke-width="8" stroke-linecap="round"/>
