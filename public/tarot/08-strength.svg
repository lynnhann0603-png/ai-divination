  <circle cx="50" cy="340" r="5" fill="#E8352D" opacity="0.5"/>
  <circle cx="100" cy="332" r="5" fill="#FFB6C1" opacity="0.5"/>
  <circle cx="150" cy="338" r="5" fill="#E8352D" opacity="0.5"/>
  <circle cx="200" cy="332" r="5" fill="#FFB6C1" opacity="0.5"/>
  <circle cx="250" cy="340" r="5" fill="#E8352D" opacity="0.5"/>
  <!-- Woman figure - head -->
  <circle cx="150" cy="140" r="24" fill="#FFDAB9"/>
  <path d="M126,140 Q128,115 150,108 Q172,115 174,140" fill="#DAA520"/>
