  <circle cx="132" cy="115" r="4" fill="#E8352D"/><circle cx="142" cy="108" r="4" fill="#FFB6C1"/>
  <circle cx="150" cy="106" r="4" fill="#FF69B4"/><circle cx="158" cy="108" r="4" fill="#FFB6C1"/>
  <circle cx="168" cy="115" r="4" fill="#E8352D"/>
  <!-- Face -->
  <circle cx="142" cy="138" r="2.5" fill="#333"/><circle cx="158" cy="138" r="2.5" fill="#333"/>
  <path d="M143,150 Q150,156 157,150" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- White dress -->
  <path d="M126,162 L105,380 L195,380 L174,162Z" fill="white" opacity="0.9"/>
  <!-- Green sash -->
  <path d="M126,200 Q150,210 174,200" fill="none" stroke="#228B22" stroke-width="5"/>
