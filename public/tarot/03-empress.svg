  <path d="M95,230 Q150,220 205,230 L210,380 L90,380Z" fill="#E8352D" opacity="0.7"/>
  <!-- Crown with 12 stars -->
  <path d="M120,95 L130,85 L140,95 L150,80 L160,95 L170,85 L180,95" fill="none" stroke="#FFD700" stroke-width="3"/>
  <g fill="#FFD700">
    <circle cx="120" cy="93" r="3"/><circle cx="130" cy="83" r="3"/><circle cx="140" cy="93" r="3"/>
    <circle cx="150" cy="78" r="4"/><circle cx="160" cy="93" r="3"/><circle cx="170" cy="83" r="3"/>
    <circle cx="180" cy="93" r="3"/>
  </g>
  <!-- Head -->
  <circle cx="150" cy="130" r="24" fill="#FFDAB9"/>
  <path d="M126,128 Q130,105 150,100 Q170,105 174,128" fill="#DAA520"/>
  <circle cx="142" cy="128" r="2.5" fill="#333"/><circle cx="158" cy="128" r="2.5" fill="#333"/>
  <path d="M143,140 Q150,146 157,140" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- White gown -->
  <path d="M126,155 L100,380 L200,380 L174,155Z" fill="white" opacity="0.9"/>
