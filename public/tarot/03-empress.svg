  <circle cx="130" cy="250" r="5" fill="#E8352D" opacity="0.5"/>
  <circle cx="150" cy="280" r="5" fill="#E8352D" opacity="0.5"/>
  <circle cx="170" cy="250" r="5" fill="#E8352D" opacity="0.5"/>
  <!-- Venus symbol on heart pillow -->
  <circle cx="150" cy="195" r="10" fill="none" stroke="#FFD700" stroke-width="2"/>
  <line x1="150" y1="205" x2="150" y2="220" stroke="#FFD700" stroke-width="2"/>
  <line x1="143" y1="213" x2="157" y2="213" stroke="#FFD700" stroke-width="2"/>
  <!-- Scepter -->
  <line x1="190" y1="150" x2="210" y2="340" stroke="#C4A44E" stroke-width="5" stroke-linecap="round"/>
  <circle cx="208" cy="145" r="10" fill="#FFD700"/>
  <circle cx="208" cy="145" r="6" fill="none" stroke="#C4A44E" stroke-width="1.5"/>
  <text x="150" y="38" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#C4A44E">III</text>
  <text x="150" y="458" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#5B4A2A">THE EMPRESS</text>
  <text x="150" y="478" text-anchor="middle" font-family="serif" font-size="14" fill="#8B7355">皇后</text>
