<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" width="300" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#F5E6B8"/></linearGradient>
    <linearGradient id="scene" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1A1A4E"/><stop offset="40%" stop-color="#2D2D5E"/><stop offset="100%" stop-color="#4E6E8E"/></linearGradient>
  </defs>
  <rect width="300" height="500" rx="16" fill="url(#bg)"/>
  <rect x="12" y="12" width="276" height="476" rx="12" fill="none" stroke="#C4A44E" stroke-width="2.5"/>
  <rect x="18" y="50" width="264" height="380" rx="8" fill="url(#scene)"/>
  <!-- Moon face -->
  <circle cx="150" cy="120" r="40" fill="#C0C0C0"/>
  <circle cx="165" cy="115" r="35" fill="url(#scene)"/>
  <!-- Moon crescent revealed -->
  <circle cx="145" cy="115" r="35" fill="#F5F5DC"/>
  <circle cx="155" cy="115" r="32" fill="url(#scene)"/>
  <!-- Face on moon -->
  <circle cx="135" cy="108" r="3" fill="#808080" opacity="0.5"/>
  <circle cx="125" cy="118" r="3" fill="#808080" opacity="0.5"/>
  <path d="M120,128 Q130,135 140,128" fill="none" stroke="#808080" stroke-width="1.5" opacity="0.5"/>
  <!-- Rays from moon -->
  <g stroke="#F5F5DC" stroke-width="1.5" opacity="0.3">
    <line x1="150" y1="75" x2="150" y2="60"/><line x1="175" y1="85" x2="188" y2="72"/>
    <line x1="195" y1="110" x2="210" y2="105"/><line x1="185" y1="140" x2="200" y2="148"/>
    <line x1="115" y1="85" x2="102" y2="72"/><line x1="100" y1="115" x2="85" y2="110"/>
  </g>
  <!-- Falling drops (yods) -->
  <g fill="#FFD700" opacity="0.5">
    <ellipse cx="80" cy="170" rx="4" ry="6"/><ellipse cx="110" cy="180" rx="4" ry="6"/>
    <ellipse cx="140" cy="175" rx="4" ry="6"/><ellipse cx="170" cy="182" rx="4" ry="6"/>
    <ellipse cx="200" cy="172" rx="4" ry="6"/><ellipse cx="225" cy="178" rx="4" ry="6"/>
    <ellipse cx="95" cy="195" rx="3" ry="5"/><ellipse cx="155" cy="200" rx="3" ry="5"/>
    <ellipse cx="210" cy="192" rx="3" ry="5"/>
  </g>
  <!-- Two towers -->
  <rect x="40" y="250" width="35" height="100" fill="#808080"/>
  <rect x="37" y="245" width="41" height="10" rx="2" fill="#696969"/>
  <rect x="38" y="235" width="10" height="15" fill="#696969"/>
  <rect x="55" y="235" width="10" height="15" fill="#696969"/>
  <rect x="225" y="250" width="35" height="100" fill="#808080"/>
  <rect x="222" y="245" width="41" height="10" rx="2" fill="#696969"/>
  <rect x="223" y="235" width="10" height="15" fill="#696969"/>
  <rect x="240" y="235" width="10" height="15" fill="#696969"/>
  <!-- Path winding between towers -->
  <path d="M150,430 Q140,400 145,370 Q155,340 150,310 Q140,280 150,250" fill="none" stroke="#DAA520" stroke-width="8" opacity="0.3"/>
  <!-- Pool at bottom -->
  <path d="M80,380 Q150,360 220,380 L220,430 L80,430Z" fill="#5B9BD5" opacity="0.3"/>
  <!-- Crayfish emerging -->
  <ellipse cx="150" cy="390" rx="20" ry="12" fill="#E8352D" opacity="0.6"/>
  <path d="M135,385 Q125,375 120,365" fill="none" stroke="#E8352D" stroke-width="3" opacity="0.6"/>
  <path d="M165,385 Q175,375 180,365" fill="none" stroke="#E8352D" stroke-width="3" opacity="0.6"/>
  <circle cx="145" cy="385" r="2" fill="#333"/><circle cx="155" cy="385" r="2" fill="#333"/>
  <!-- Dog on left -->
  <ellipse cx="100" cy="340" rx="18" ry="12" fill="#DAA520"/>
  <circle cx="112" cy="330" r="8" fill="#DAA520"/>
  <circle cx="115" cy="328" r="2" fill="#333"/>
  <path d="M108,323 L105,317" stroke="#DAA520" stroke-width="2"/>
  <path d="M118,323 L121,317" stroke="#DAA520" stroke-width="2"/>
  <!-- Howling mouth -->
  <path d="M115,334 Q118,340 121,334" fill="none" stroke="#333" stroke-width="1"/>
  <!-- Wolf on right -->
  <ellipse cx="200" cy="340" rx="18" ry="12" fill="#808080"/>
  <circle cx="212" cy="330" r="8" fill="#808080"/>
  <circle cx="215" cy="328" r="2" fill="#333"/>
  <path d="M208,323 L205,316" stroke="#808080" stroke-width="2"/>
  <path d="M218,323 L221,316" stroke="#808080" stroke-width="2"/>
  <path d="M215,334 Q218,340 221,334" fill="none" stroke="#333" stroke-width="1"/>
  <text x="150" y="38" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#C4A44E">XVIII</text>
  <text x="150" y="458" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#5B4A2A">THE MOON</text>
  <text x="150" y="478" text-anchor="middle" font-family="serif" font-size="14" fill="#8B7355">月亮</text>
</svg>