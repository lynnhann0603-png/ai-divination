<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" width="300" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#F5E6B8"/></linearGradient>
    <linearGradient id="scene" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#DDA0DD" opacity="0.3"/><stop offset="50%" stop-color="#E8E0D0"/><stop offset="100%" stop-color="#808080"/></linearGradient>
  </defs>
  <rect width="300" height="500" rx="16" fill="url(#bg)"/>
  <rect x="12" y="12" width="276" height="476" rx="12" fill="none" stroke="#C4A44E" stroke-width="2.5"/>
  <rect x="18" y="50" width="264" height="380" rx="8" fill="url(#scene)"/>
  <!-- Pillars -->
  <rect x="55" y="80" width="20" height="300" fill="#808080" rx="3"/>
  <rect x="225" y="80" width="20" height="300" fill="#808080" rx="3"/>
  <!-- Purple veil between -->
  <rect x="75" y="80" width="150" height="20" fill="#9370DB" opacity="0.3"/>
  <!-- Throne -->
  <rect x="100" y="180" width="100" height="180" rx="5" fill="#808080" opacity="0.5"/>
  <!-- Crown -->
  <rect x="130" y="95" width="40" height="12" rx="3" fill="#FFD700"/>
  <polygon points="135,95 140,82 145,95" fill="#FFD700"/>
  <polygon points="147,95 150,80 153,95" fill="#FFD700"/>
  <polygon points="155,95 160,82 165,95" fill="#FFD700"/>
  <!-- Head -->
  <circle cx="150" cy="130" r="22" fill="#FFDAB9"/>
  <path d="M128,128 Q130,108 150,102 Q170,108 172,128" fill="#333"/>
  <circle cx="142" cy="128" r="2" fill="#333"/><circle cx="158" cy="128" r="2" fill="#333"/>
  <path d="M142,140 Q150,144 158,140" fill="none" stroke="#333" stroke-width="1.2"/>
  <!-- Red robe -->
  <path d="M128,152 L105,370 L195,370 L172,152Z" fill="#CC0000"/>
  <!-- Green cloak -->
  <path d="M105,170 L80,370 L105,370Z" fill="#228B22" opacity="0.7"/>
  <path d="M195,170 L220,370 L195,370Z" fill="#228B22" opacity="0.7"/>
  <!-- Scales of justice - right hand raised -->
  <line x1="175" y1="180" x2="210" y2="160" stroke="#FFDAB9" stroke-width="6" stroke-linecap="round"/>
  <!-- Scale balance -->
  <line x1="210" y1="145" x2="210" y2="155" stroke="#FFD700" stroke-width="3"/>
  <line x1="185" y1="145" x2="235" y2="145" stroke="#FFD700" stroke-width="2"/>
  <!-- Scale pans -->
  <path d="M180,145 Q177,155 185,155 Q192,155 190,145" fill="none" stroke="#FFD700" stroke-width="1.5"/>
  <path d="M230,145 Q227,155 235,155 Q242,155 240,145" fill="none" stroke="#FFD700" stroke-width="1.5"/>
  <line x1="185" y1="145" x2="185" y2="155" stroke="#FFD700" stroke-width="1"/>
  <line x1="235" y1="145" x2="235" y2="155" stroke="#FFD700" stroke-width="1"/>
  <!-- Sword in left hand - pointing up -->
  <line x1="115" y1="180" x2="95" y2="80" stroke="#A8A8A8" stroke-width="4"/>
  <line x1="88" y1="120" x2="102" y2="120" stroke="#A8A8A8" stroke-width="3"/>
  <!-- Square and circle on chest -->
  <rect x="140" y="175" width="20" height="20" fill="none" stroke="#FFD700" stroke-width="1.5"/>
  <circle cx="150" cy="185" r="7" fill="none" stroke="#FFD700" stroke-width="1"/>
  <!-- Shoe peeking out -->
  <path d="M140,360 Q150,370 160,360" fill="none" stroke="#E8352D" stroke-width="3"/>
  <text x="150" y="38" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#C4A44E">XI</text>
  <text x="150" y="458" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#5B4A2A">JUSTICE</text>
  <text x="150" y="478" text-anchor="middle" font-family="serif" font-size="14" fill="#8B7355">正义</text>
</svg>