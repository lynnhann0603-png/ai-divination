  <text x="150" y="38" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#C4A44E">0</text>
  <!-- Title -->
  <text x="150" y="458" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#5B4A2A">THE FOOL</text>
  <text x="150" y="478" text-anchor="middle" font-family="serif" font-size="14" fill="#8B7355">愚者</text>
</svg>