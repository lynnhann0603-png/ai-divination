  <circle cx="143" cy="130" r="3" fill="#FF4444"/><circle cx="155" cy="127" r="3" fill="#FF6B6B"/>
  <circle cx="167" cy="130" r="3" fill="#FF4444"/>
  <!-- Face -->
  <circle cx="148" cy="158" r="2" fill="#333"/><circle cx="162" cy="158" r="2" fill="#333"/>
  <path d="M149,167 Q155,172 161,167" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Tunic -->
  <path d="M135,180 L130,280 L180,280 L175,180Z" fill="#E8352D"/>
  <path d="M130,200 L110,260 L135,255Z" fill="#E8352D"/>
  <path d="M175,200 L195,260 L170,255Z" fill="#E8352D"/>
