  <ellipse cx="195" cy="310" rx="16" ry="10" fill="white"/>
  <circle cx="207" cy="302" r="7" fill="white"/>
  <circle cx="209" cy="300" r="2" fill="#333"/>
  <path d="M202,296 L198,290" stroke="#333" stroke-width="1.5"/>
  <path d="M212,296 L216,290" stroke="#333" stroke-width="1.5"/>
