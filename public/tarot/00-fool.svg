<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" width="300" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#F5E6B8"/></linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#87CEEB"/><stop offset="60%" stop-color="#E0F0FF"/><stop offset="100%" stop-color="#F5E6B8"/></linearGradient>
  </defs>
  <rect width="300" height="500" rx="16" fill="url(#bg)"/>
  <rect x="12" y="12" width="276" height="476" rx="12" fill="none" stroke="#C4A44E" stroke-width="2.5"/>
  <rect x="18" y="50" width="264" height="380" rx="8" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="240" cy="90" r="30" fill="#FFD700" opacity="0.9"/>
  <g stroke="#FFD700" stroke-width="2" opacity="0.6">
    <line x1="240" y1="52" x2="240" y2="44"/><line x1="268" y1="62" x2="274" y2="56"/>
    <line x1="278" y1="90" x2="286" y2="90"/><line x1="268" y1="118" x2="274" y2="124"/>
  </g>
  <!-- Mountains -->
