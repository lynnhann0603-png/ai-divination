  <path d="M18,340 Q80,320 120,350 Q160,310 200,340 Q240,320 282,340 L282,430 L18,430Z" fill="#8B7355"/>
  <path d="M18,340 Q80,320 120,350 Q160,310 200,340 Q240,320 282,340" fill="none" stroke="#6B5335" stroke-width="1.5"/>
