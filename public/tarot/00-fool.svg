  <line x1="142" y1="280" x2="138" y2="330" stroke="#FFDAB9" stroke-width="8" stroke-linecap="round"/>
  <line x1="168" y1="280" x2="175" y2="325" stroke="#FFDAB9" stroke-width="8" stroke-linecap="round"/>
  <!-- Boots -->
  <ellipse cx="136" cy="335" rx="12" ry="6" fill="#8B4513"/>
  <ellipse cx="178" cy="328" rx="12" ry="6" fill="#8B4513"/>
  <!-- Bundle on stick -->
  <line x1="170" y1="175" x2="200" y2="130" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
  <circle cx="205" cy="120" r="16" fill="#E8352D" opacity="0.8"/>
  <circle cx="205" cy="120" r="16" fill="none" stroke="#C4A44E" stroke-width="1"/>
