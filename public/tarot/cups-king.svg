<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500" width="300" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#F5E6B8"/>
    </linearGradient>
    <linearGradient id="scene" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4E6F1"/>
      <stop offset="100%" stop-color="#AED6F1"/>
    </linearGradient>
  </defs>

  <!-- 暖黄色背景（与大阿卡纳一致） -->
  <rect width="300" height="500" rx="16" fill="url(#bg)"/>

  
    <!-- 外边框（与大阿卡纳统一金色） -->
    <rect x="12" y="12" width="276" height="476" rx="12" fill="none" stroke="#C4A44E" stroke-width="2.5"/>
    <!-- 内边框角装饰 -->
    <circle cx="24" cy="24" r="2.5" fill="#C4A44E" opacity="0.6"/>
    <circle cx="276" cy="24" r="2.5" fill="#C4A44E" opacity="0.6"/>
    <circle cx="24" cy="476" r="2.5" fill="#C4A44E" opacity="0.6"/>
    <circle cx="276" cy="476" r="2.5" fill="#C4A44E" opacity="0.6"/>

  <!-- 场景区域 -->
  <rect x="18" y="50" width="264" height="340" rx="8" fill="url(#scene)" opacity="0.5"/>

  <!-- 顶部：编号 + 花色元素名 -->
  <text x="30" y="42" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#2E7D9B">K</text>
  <text x="270" y="42" font-family="sans-serif" font-size="14" fill="#5DADE2" text-anchor="end" opacity="0.7">水</text>

  <!-- 中央主体内容 -->
  
        <g transform="translate(150, 200)" opacity="0.9">
          <!-- 头部 -->
          <circle cx="0" cy="-60" r="28" fill="none" stroke="#2E7D9B" stroke-width="3"/>
          <!-- 大王冠 -->
          <path d="M-18,-89 L-12,-105 L-4,-95 L0,-105 L4,-95 L12,-105 L18,-89" fill="none" stroke="#5DADE2" stroke-width="2.5"/>
          <circle cx="-12" cy="-105" r="2.5" fill="#5DADE2"/>
          <circle cx="0" cy="-105" r="3" fill="#5DADE2"/>
          <circle cx="12" cy="-105" r="2.5" fill="#5DADE2"/>
          <circle cx="-8" cy="-63" r="3" fill="#1A5276"/>
          <circle cx="8" cy="-63" r="3" fill="#1A5276"/>
          <!-- 胡须 -->
          <path d="M-10,-50 Q0,-44 10,-50" fill="none" stroke="#1A5276" stroke-width="1.5"/>
          <path d="M-6,-48 Q0,-42 6,-48" fill="none" stroke="#1A5276" stroke-width="1"/>
          <!-- 宽袍身体 -->
          <path d="M0,-32 Q-28,5 -32,58 L32,58 Q28,5 0,-32" fill="none" stroke="#2E7D9B" stroke-width="2.5"/>
          <!-- 手臂（持权杖/圣杯姿态） -->
          <line x1="-28" y1="-5" x2="-42" y2="12" stroke="#2E7D9B" stroke-width="2"/>
          <line x1="28" y1="-5" x2="48" y2="-20" stroke="#2E7D9B" stroke-width="2"/>
          <line x1="48" y1="-20" x2="50" y2="-35" stroke="#5DADE2" stroke-width="2"/>
          <!-- 腿/袍底 -->
          <path d="M-32,58 L-28,85 M32,58 L28,85" fill="none" stroke="#2E7D9B" stroke-width="2"/>
          <circle cx="0" cy="-60" r="7" fill="#5DADE2" opacity="0.2"/>
        </g>

  <!-- 底部：牌名 -->
  <text x="150" y="408" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" fill="#2E7D9B" text-anchor="middle">圣杯国王</text>
  <text x="150" y="430" font-family="Georgia, serif" font-size="13" fill="#1A5276" text-anchor="middle" opacity="0.7">King of Cups</text>

  
        <path d="M100,440 Q125,425 150,440 Q175,425 200,440" fill="none" stroke="#2E7D9B" stroke-width="1.5" opacity="0.25"/>
        <path d="M110,455 Q135,440 160,455 Q185,440 210,455" fill="none" stroke="#5DADE2" stroke-width="1" opacity="0.15"/>
</svg>